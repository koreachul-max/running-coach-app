name: RunningCoachApp

options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "16.0"

settings:
  base:
    SWIFT_VERSION: 5.0
    PRODUCT_BUNDLE_IDENTIFIER: com.example.runningcoachapp
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 1
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: Running Coach
    INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: Track your running route while the app is in use.
    INFOPLIST_KEY_NSPhotoLibraryUsageDescription: Select running photos and videos to save and share.
    INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: Save generated running content to your photo library.

targets:
  RunningCoachApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: .
        excludes:
          - .git
          - README.md
          - codemagic.yaml
          - project.yml
          - .gitignore
    settings:
      base:
        PRODUCT_NAME: RunningCoachApp
        TARGETED_DEVICE_FAMILY: 1
        SUPPORTS_MACCATALYST: NO
    scheme:
      gatherCoverageData: false
